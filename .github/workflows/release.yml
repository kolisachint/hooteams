name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Run release script
        run: bun run release:${{ inputs.version }}

      - name: Push changes
        run: git push --follow-tags

  github-release:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Create Release
        run: |
          VERSION=$(bun -e "const pkg = require('./packages/core/package.json'); console.log(pkg.version)")
          gh release create "v$VERSION" --title "v$VERSION" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
